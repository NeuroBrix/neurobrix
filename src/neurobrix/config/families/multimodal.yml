# Family-level constants for Multimodal Unified models
# Pattern: text input + (text OR image) output via separate heads
# Reference vendor: DeepSeek Janus-Pro (multimodal_understanding + generate)
# NeuroBrix doctrine: --mode obligatoire (multimodal_strict)

output_processing:
  # Output layout depends on resolved mode (set at dispatch time)
  # text mode → sequence, image mode → CHW
  layout: "mode_dependent"
  batch_axis: 0
  sequence_axis: 1
  channel_axis: 1
  vocab_axis: -1
  valid_channels: [1, 3, 4]
  bit_depth: 8
  output_range: [-1.0, 1.0]
  output_format: "mode_dependent"

# Text-mode defaults (Qwen-style chat)
text:
  defaults:
    max_new_tokens: 512
    temperature: 0.7
    top_p: 0.9
    top_k: 50
    repetition_penalty: 1.0

# Image-mode defaults (Janus VQ autoregressive)
autoregressive:
  defaults:
    temperature: 1.0
    top_p: 1.0
    top_k: 0
    cfg_weight: 5.0
  vq:
    patch_size: 16
    codebook_size: 16384

defaults:
  height: 384
  width: 384

architecture:
  rope:
    base: 10000.0
    scaling_type: null
    scaling_factor: 1.0
  attention:
    type: "sdpa"
    head_dim: 128
    num_kv_heads: null

kv_cache:
  enabled: true
  strategy: "dynamic"
  injection_op: "aten::scaled_dot_product_attention"

execution:
  flow_type: "autoregressive_generation"
  has_kv_cache: true
  use_graph_executor: true
  compiled_mode: true

inputs:
  required: ["--prompt"]
  optional:
    - flag: "--input-image"
      triggers_mode: "text"
    - flag: "--system"
    - flag: "--chat"
    - flag: "--no-chat"

modes:
  supported: ["text", "image"]
  default: null
  multimodal_strict: true

output:
  default_extension_per_mode:
    text: ".txt"
    image: ".png"
