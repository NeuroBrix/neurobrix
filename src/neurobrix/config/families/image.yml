# Family-level constants for image generation models
# NeuroBrix ZERO HARDCODE: All image family models share these defaults

output_processing:
  layout: "CHW"              # Channel-Height-Width ordering (PyTorch standard)
  channel_axis: 1            # Channels at dimension 1 (after batch)
  batch_axis: 0              # Batch at dimension 0
  valid_channels: [1, 3, 4]  # Grayscale (1), RGB (3), RGBA (4)
  bit_depth: 8               # 8-bit output (0-255)
  output_range: [-1.0, 1.0]  # Model output range before normalization
  output_format: "png"       # Default output file format

# =============================================================================
# DIFFUSION-BASED IMAGE GENERATION (PixArt, SDXL, Flux, etc.)
# =============================================================================
diffusion:
  defaults:
    num_inference_steps: 20    # Default denoising steps
    guidance_scale: 7.5        # Default CFG scale
    cfg_threshold: 1.0         # Enable CFG when guidance_scale > this value
    negative_prompt: ""        # Empty is allowed (user choice)

# =============================================================================
# AUTOREGRESSIVE IMAGE GENERATION (Janus, LlamaGen, etc.)
# Uses LLM-style token-by-token generation, not diffusion
# =============================================================================
autoregressive:
  defaults:
    temperature: 1.0           # Sampling temperature (1.0 = diverse)
    top_p: 1.0                 # Nucleus sampling (1.0 = disabled)
    top_k: 0                   # Top-k sampling (0 = disabled)
    cfg_weight: 5.0            # Classifier-free guidance weight

  # VQ (Vector Quantized) tokenizer settings
  vq:
    patch_size: 16             # VQ patch size (pixels per token)
    codebook_size: 16384       # Number of visual tokens

  # Inherits LLM architecture constants for RoPE, attention, etc.
  # See config/families/llm.yml for rope.base, attention.head_dim, etc.

# =============================================================================
# SHARED DEFAULTS (apply to both diffusion and autoregressive)
# =============================================================================
defaults:
  height: 1024               # Default output height
  width: 1024                # Default output width

execution:
  # flow_type varies per model (iterative_process diffusion vs autoregressive_generation VQ)
  has_kv_cache: false        # Diffusion path; VQ-image override via topology check
  use_graph_executor: true
  compiled_mode: true

inputs:
  required: ["--prompt"]
  optional:
    - flag: "--input-image"
      triggers_mode: "img2img"
    - flag: "--mask-image"
      requires: "--input-image"
      triggers_mode: "inpainting"
    - flag: "--reference-image"
    - flag: "--steps"
    - flag: "--cfg"
    - flag: "--height"
    - flag: "--width"

modes:
  supported: ["t2i", "img2img", "inpainting"]
  default: "t2i"
  multimodal_strict: false

output:
  default_extension_per_mode:
    t2i: ".png"
    img2img: ".png"
    inpainting: ".png"

# ============================================================================
# DTYPE POLICY — auto-detect components that need fp32 to avoid the documented
# fp16 conv-cascade overflow (Layer-7 follow-up: PixArt VAE 512x512x512 conv2d
# output saturates to ±Inf when storage dtype is fp16, then propagates NaN).
# Composes additively with the manual `requires_fp32_compute` registry flag —
# manual entries always win. NBX_DISABLE_AUTO_FP32=1 bypasses the auto-detect
# without touching the manual flag.
# ============================================================================
dtype_policy:
  auto_fp32_on_overflow_risk:
    enabled: true
    # The component's build-time recorded dtype. Native fp16/bf16 components
    # are not at this overflow site (bf16 covers the magnitude; native fp16
    # components were already designed to fit).
    require_graph_dtype: "float32"
    # Only fire on fp16-preferring hardware. On bf16-capable hardware
    # (A100/H100, RTX 30xx/40xx, ROCm CDNA) the conv output saturation
    # does not occur because bf16 has fp32 exponent range. Pinning to
    # fp32 there would waste VRAM with no numeric benefit.
    skip_when_hw_supports_bf16: true
    # Conv-cascade-dominance gate. Selects VAE-class encoders/decoders;
    # excludes the DiT patch-embed transformer (1 conv2d) and hybrid
    # linear-attention transformers (Sana DiT: 61 conv2d but 20 sdpa
    # so ratio = 3 << 10). Thresholds derived from the cached-matrix
    # empirical audit (Ch8 audit doc).
    min_conv2d_count: 20
    conv2d_to_sdpa_ratio_min: 10

