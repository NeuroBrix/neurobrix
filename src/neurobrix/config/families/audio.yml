# Family-level constants for audio models (STT + TTS)
# NeuroBrix ZERO HARDCODE: All audio family models share these defaults

output_processing:
  layout: "channels_last"    # Audio typically uses [batch, samples, channels]
  channel_axis: -1           # Channels at last dimension
  batch_axis: 0              # Batch at dimension 0
  bit_depth: 16              # 16-bit audio (CD quality)
  sample_rate: 16000         # 16kHz standard for STT (TTS models override per-model)
  output_range: [-1.0, 1.0]  # Normalized audio range

defaults:
  temperature: 0.0           # Greedy decoding default for STT
  max_tokens: 448            # Whisper default max generation length
