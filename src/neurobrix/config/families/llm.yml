# Family-level constants for LLM (text generation) models
# NeuroBrix ZERO HARDCODE: All LLM family models share these defaults

output_processing:
  layout: "sequence"         # [batch, sequence, vocab] for logits
  batch_axis: 0              # Batch at dimension 0
  sequence_axis: 1           # Sequence at dimension 1
  vocab_axis: -1             # Vocabulary/logits at last dimension
  output_format: "txt"       # Decoded text output

defaults:
  max_new_tokens: 512        # Maximum generation length
  temperature: 0.7           # Sampling temperature
  top_p: 0.9                 # Nucleus sampling threshold
  top_k: 50                  # Top-k sampling
  repetition_penalty: 1.0    # Penalty for token repetition

# Architecture constants - ZERO HARDCODE
# These are universal defaults; model-specific values come from component config
architecture:
  # Rotary Position Embedding (RoPE) defaults
  rope:
    base: 10000.0            # Standard RoPE base (Llama, DeepSeek, Janus, etc.)
    scaling_type: null       # null | "linear" | "dynamic" | "yarn"
    scaling_factor: 1.0      # Scaling factor for extended context

  # Attention defaults
  attention:
    type: "sdpa"             # sdpa | flash_attention
    head_dim: 128            # Common head dimension
    num_kv_heads: null       # null = same as num_heads (MHA), else GQA/MQA

# KV Cache runtime configuration
kv_cache:
  enabled: true              # Enable KV caching during inference
  strategy: "dynamic"        # dynamic | static_padded
  injection_op: "aten::scaled_dot_product_attention"  # Op to intercept for cache injection

# MoE (Mixture of Experts) support - auto-detected from model config
moe:
  enabled: false             # Override per model (deepseek-moe, mixtral, etc.)
  top_k: 6                   # Number of experts selected per token
  num_experts: 64            # Total number of experts
  routing_type: "top_k"      # top_k | expert_choice

# Execution configuration
execution:
  flow_type: "autoregressive_generation"
  has_kv_cache: true         # LLM autoregressive uses KV cache
  use_graph_executor: true   # Force GraphExecutor instead of UniversalLMExecutor
  compiled_mode: true        # Use CompiledSequenceV2 for zero-overhead execution

inputs:
  required: ["--prompt"]
  optional:
    - flag: "--system"
    - flag: "--chat"
    - flag: "--no-chat"
    - flag: "--temperature"
    - flag: "--repetition-penalty"
    - flag: "--max-tokens"

modes:
  supported: ["text", "chat", "agent"]
  default: "text"
  multimodal_strict: false

# Agent-mode defaults (P-AGENTIC). The mode is additionally gated at
# runtime on the model's embedded chat template declaring a tools
# contract — non-tool models get a clear error, never a fallback.
agent:
  max_turns: 25              # Loop turn bound (overridable via --max-turns)
  bash_timeout_s: 120        # Per-command bash timeout (overridable)

output:
  default_extension_per_mode:
    text: ".txt"
    chat: ".txt"
    agent: ".txt"
