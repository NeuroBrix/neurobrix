# Family-level constants for video generation models
# NeuroBrix ZERO HARDCODE: All video family models share these defaults

output_processing:
  layout: "CTHW"             # Channel-Time-Height-Width (diffusers standard: [B,C,T,H,W])
  channel_axis: 1            # Channels at dimension 1 (after batch)
  time_axis: 2               # Temporal dimension at position 2
  batch_axis: 0              # Batch at dimension 0
  valid_channels: [3]        # RGB video (no alpha typically)
  bit_depth: 8               # 8-bit output per channel
  fps: 24                    # Default frame rate
  output_range: [-1.0, 1.0]  # Model output range
  output_format: "mp4"       # Default output file format

defaults:
  num_inference_steps: 50    # Video models balance quality/speed
  guidance_scale: 7.5        # Similar to image
  height: 512                # Video often uses lower resolution
  width: 512                 # than image for memory reasons
  num_frames: 16             # Default number of frames
  negative_prompt: ""        # Empty is allowed

execution:
  flow_type: "iterative_process"
  has_kv_cache: false
  use_graph_executor: true
  compiled_mode: true

inputs:
  required: ["--prompt"]
  optional:
    - flag: "--input-image"
      triggers_mode: "i2v"
    - flag: "--video"
      triggers_mode: "v2v"
    - flag: "--num-frames"
    - flag: "--fps"
    - flag: "--steps"
    - flag: "--cfg"
    - flag: "--height"
    - flag: "--width"

modes:
  supported: ["t2v", "i2v", "v2v"]
  default: "t2v"
  multimodal_strict: false

output:
  default_extension_per_mode:
    t2v: ".mp4"
    i2v: ".mp4"
    v2v: ".mp4"

# ============================================================================
# DTYPE POLICY — same conv-cascade overflow physics as image VAE.
# See config/families/image.yml dtype_policy comment + docs/audits/
# layer7_auto_fp32_audit.md (Ch8). Video VAEs (CogVideoX, Wan, Mochi,
# Allegro, Open-Sora) share the conv-encoder/decoder cascade pattern;
# auto-detect should fire on them under the same rule.
# ============================================================================
dtype_policy:
  auto_fp32_on_overflow_risk:
    enabled: true
    require_graph_dtype: "float32"
    skip_when_hw_supports_bf16: true
    min_conv2d_count: 20
    conv2d_to_sdpa_ratio_min: 10

