# Hardware Profile: 2x V100 32GB (cuda:2 + cuda:3) reported as 20 GB each
# ID: v100-32g-x2-split20
# Purpose: The D1 multi-GPU matrix profile. Reports 20000 MB per GPU on the
#          two 32GB cards (cuda:2, cuda:3) so that a ~30GB single component
#          (deepseek-moe-16b `model`, ~31.6 GB) CANNOT fit one GPU (>20 GB)
#          but the two GPUs TOGETHER can (2x20 = 40 GB > 31.6 GB, so NO zero3
#          / cpu_execution fallback), forcing a genuine GPU<->GPU
#          intra-component split (pipeline_parallel block scatter / weight
#          sharding) with an op whose activation crosses cuda:2 -> cuda:3.
#          This is the controlled repro for the D1 multi-device co-location
#          path across all four modes (compiled / triton / triton_sequential
#          / sequential). Unlike the memory-lie profiles on a small model
#          (which collapse the placement back to a single GPU because the
#          model still fits), a 31.6 GB component genuinely needs both GPUs,
#          so the split is real. Real hardware is 32 GB per GPU -- Prism only
#          consults memory_mb for sizing; execution has the full 32 GB so it
#          does not OOM. Uses cuda:2 + cuda:3 (the 32GB cards).

id: v100-32g-x2-split20
vendor: dell

summary:
  total_gpus: 2
  total_vram_gb: 40
  topology: "Multi-GPU"

devices:
  - index: 2
    brand: nvidia
    model: "Tesla V100-SXM2-32GB"
    memory_mb: 20000
    compute_capability: "7.0"
    supports_dtypes: ["float32", "float16"]
    architecture: volta
    pcie_version: "3.0"
  - index: 3
    brand: nvidia
    model: "Tesla V100-SXM2-32GB"
    memory_mb: 20000
    compute_capability: "7.0"
    supports_dtypes: ["float32", "float16"]
    architecture: volta
    pcie_version: "3.0"

interconnect:
  groups:
    - index: 0
      members: [2, 3]
      type: nvlink_p2p
      tech: nvlink
      bandwidth_gbps: 300

pcie_fallback:
  version: "3.0"
  lanes: 16
  bandwidth_gbps: 32
