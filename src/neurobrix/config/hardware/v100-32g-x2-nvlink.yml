# Hardware Profile: 2x NVIDIA V100 32GB with NVLink
# Purpose: Dual V100-32GB for tensor parallel inference

id: v100-32g-x2-nvlink
vendor: nvidia
preferred_dtype: "float16"  # V100 tensor cores: fp16 is 2x throughput vs fp32

summary:
  total_gpus: 2
  total_vram_gb: 64
  topology: "Multi-GPU"

devices:
  - index: 2
    brand: nvidia
    model: "Tesla V100-SXM2-32GB"
    memory_mb: 32510
    compute_capability: "7.0"
    supports_dtypes: ["float32", "float16"]
    architecture: volta
    pcie_version: "3.0"
  - index: 3
    brand: nvidia
    model: "Tesla V100-SXM2-32GB"
    memory_mb: 32510
    compute_capability: "7.0"
    supports_dtypes: ["float32", "float16"]
    architecture: volta
    pcie_version: "3.0"

interconnect:
  groups:
    - index: 0
      members: [2, 3]
      type: nvlink_p2p
      tech: nvlink
      bandwidth_gbps: 300

pcie_fallback:
  version: "3.0"
  lanes: 16
  bandwidth_gbps: 32

notes: |
  Dual V100-32GB with NVLink for tensor parallel inference.
  Total 64GB VRAM - sufficient for most 16B parameter models in FP32.
  No bfloat16 hardware support (Volta architecture).
