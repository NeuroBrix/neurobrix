# Hardware Profile: Tight 2x V100 16GB NVLink — matrix-test profile
# ID: v100-16g-x2-tight-2200
# Purpose: Deliberately report 2200 MB per GPU to Prism so small LLMs
#          (TinyLlama-1.1B, ~2 GB weights) cross the strategy
#          engagement thresholds:
#            - pipeline_parallel / block_scatter: need component > 80% of
#              largest GPU (= 1760 MB). TinyLlama model at ~2 GB exceeds,
#              triggers layer/block distribution across the 2 GPUs.
#            - weight_sharding: needs component > full capacity
#              (= 2090 MB effective). TinyLlama model exceeds, triggers.
#            - component_placement: model weight + activation saturates
#              GPU 0, lm_head (~120 MB) forced onto GPU 1, producing
#              len(used_devices) == 2.
# Real hardware is 16 GB per GPU — Prism only consults memory_mb for
# sizing decisions, the runtime still has the full 16 GB available, so
# execution does not OOM even with the tight report.
# Uses cuda:0 + cuda:1 so it never contends with the regression harness
# (which lives on cuda:2 / cuda:3).

id: v100-16g-x2-tight-2200
vendor: dell

summary:
  total_gpus: 2
  total_vram_gb: 4
  topology: "Multi-GPU"

devices:
  - index: 0
    brand: nvidia
    model: "Tesla V100-SXM2-16GB"
    memory_mb: 2200
    compute_capability: "7.0"
    supports_dtypes: ["float32", "float16"]
    architecture: volta
    pcie_version: "3.0"
  - index: 1
    brand: nvidia
    model: "Tesla V100-SXM2-16GB"
    memory_mb: 2200
    compute_capability: "7.0"
    supports_dtypes: ["float32", "float16"]
    architecture: volta
    pcie_version: "3.0"

interconnect:
  groups:
    - index: 0
      members: [0, 1]
      type: nvlink_p2p
      tech: nvlink
      bandwidth_gbps: 300

pcie_fallback:
  version: "3.0"
  lanes: 16
  bandwidth_gbps: 32
