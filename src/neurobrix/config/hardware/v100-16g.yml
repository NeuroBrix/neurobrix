# Hardware Profile: NVIDIA V100 16GB
# Single V100 with 16GB HBM2 memory

id: v100-16g
vendor: nvidia
preferred_dtype: float16
summary:
  total_gpus: 1
  total_vram_gb: 16
  topology: Single-GPU
# CPU section enables the Doctrine R35 cascade — `_place_component`
# Strategy 4 (CPU placement for components that overflow the GPU)
# and `cpu_execution` (last-resort whole-model CPU) both consult the
# host RAM budget here.
cpu:
  model: generic-x86_64
  cores: 16
  threads: 32
  ram_mb: 131072
  architecture: x86_64
  features:
  - fma
  - sse4_1
  - sse4_2
  - avx
  - f16c
  - avx2
devices:
- index: 0
  brand: nvidia
  model: Tesla V100-SXM2-16GB
  memory_mb: 16160
  compute_capability: '7.0'
  supports_dtypes:
  - float32
  - float16
  architecture: volta
  pcie_version: '3.0'
interconnect:
  groups: []
pcie_fallback:
  version: '3.0'
  lanes: 16
  bandwidth_gbps: 32
notes: |
  NVIDIA V100 with 16GB HBM2 memory.
  No bfloat16 hardware support (Volta architecture).
  Recommended for inference and small training jobs.
