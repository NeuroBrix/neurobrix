# Hardware Profile: 2x V100 16GB NVLink — cuda:0 + cuda:1 slice
# ID: v100-16g-x2-01
# Purpose: Report the real 2-GPU slice of the Dell C4140 (cuda:0 +
#          cuda:1). Pairs with v100-16g-x2-tight-2200 / tight-2000
#          (matrix-test profiles that lie about memory) to exercise
#          Prism multi-device strategies without contending with the
#          regression harness on cuda:2 / cuda:3.
# Spec: 2 × V100 16GB (NVLink full-mesh on the Dell C4140).

id: v100-16g-x2-01
vendor: dell
# preferred_dtype: same as the sibling V100 profiles (v100-16g, v100-32g)
# — V100 sm_70 has no bf16 hardware support but float16 is the right
# default for bf16 source models that pass `_scan_bf16_fp16_safety`.
# Without this, `PrismSolver._resolve_dtype` falls through the cascade
# and lands on float32 (because the dominant model dtype is float32-or-
# bfloat16 in most diffusion models), doubling the activation estimate
# and inflating ZERO FALLBACK reports.
# P-PRISM-ACTIVATION-ESTIMATOR-TILING-AWARE 2026-05-11.
preferred_dtype: float16

summary:
  total_gpus: 2
  total_vram_gb: 32
  topology: "Multi-GPU"

devices:
  - index: 0
    brand: nvidia
    model: "Tesla V100-SXM2-16GB"
    memory_mb: 16160
    compute_capability: "7.0"
    supports_dtypes: ["float32", "float16"]
    architecture: volta
    pcie_version: "3.0"
  - index: 1
    brand: nvidia
    model: "Tesla V100-SXM2-16GB"
    memory_mb: 16160
    compute_capability: "7.0"
    supports_dtypes: ["float32", "float16"]
    architecture: volta
    pcie_version: "3.0"

interconnect:
  groups:
    - index: 0
      members: [0, 1]
      type: nvlink_p2p
      tech: nvlink
      bandwidth_gbps: 300

pcie_fallback:
  version: "3.0"
  lanes: 16
  bandwidth_gbps: 32
