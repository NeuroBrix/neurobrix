# Hardware Profile: Tight 2x V100 16GB NVLink — matrix-test profile
# ID: v100-16g-x2-tight-2000
# Purpose: Companion to v100-16g-x2-tight-2200. Drops the reported
#          per-GPU memory to 2000 MB so small LLMs (TinyLlama-1.1B,
#          weights ~1.97 GB) cross the `weight_sharding` engagement
#          threshold. `_try_weight_sharding` (solver.py:1405) compares
#          `m.weight_mb + m.activation_mb` against
#          `devices[0].capacity_mb = memory_mb * 0.95 = 1900 MB`.
#          TinyLlama weight + activation = ~2009 MB > 1900 MB, triggers
#          the TP-style shard. Kept distinct from tight-2200 because
#          the 2200 profile sits just ABOVE the weight_sharding
#          threshold (2090 cap vs 2009 need) while still being below
#          the pipeline_parallel / block_scatter threshold (80 % = 1760).
# Real hardware is 16 GB per GPU — Prism only consults memory_mb for
# sizing decisions, execution has the full 16 GB available so it does
# not OOM. Uses cuda:0 + cuda:1 so it never contends with the
# regression harness on cuda:2 / cuda:3.

id: v100-16g-x2-tight-2000
vendor: dell

summary:
  total_gpus: 2
  total_vram_gb: 4
  topology: "Multi-GPU"

devices:
  - index: 0
    brand: nvidia
    model: "Tesla V100-SXM2-16GB"
    memory_mb: 2000
    compute_capability: "7.0"
    supports_dtypes: ["float32", "float16"]
    architecture: volta
    pcie_version: "3.0"
  - index: 1
    brand: nvidia
    model: "Tesla V100-SXM2-16GB"
    memory_mb: 2000
    compute_capability: "7.0"
    supports_dtypes: ["float32", "float16"]
    architecture: volta
    pcie_version: "3.0"

interconnect:
  groups:
    - index: 0
      members: [0, 1]
      type: nvlink_p2p
      tech: nvlink
      bandwidth_gbps: 300

pcie_fallback:
  version: "3.0"
  lanes: 16
  bandwidth_gbps: 32
