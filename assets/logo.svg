<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8d4ec"/>
      <stop offset="100%" stop-color="#d8e8f4"/>
    </linearGradient>
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5588bb"/>
      <stop offset="45%" stop-color="#c89038"/>
      <stop offset="100%" stop-color="#e8a840"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d6898"/>
      <stop offset="45%" stop-color="#a87028"/>
      <stop offset="100%" stop-color="#d09030"/>
    </linearGradient>
    <clipPath id="topClip"><polygon points="200,55 350,130 200,205 50,130"/></clipPath>
    <clipPath id="leftClip"><polygon points="50,130 200,205 200,350 50,275"/></clipPath>
    <clipPath id="rightClip"><polygon points="200,205 350,130 350,275 200,350"/></clipPath>
  </defs>

  <!-- === CUBE FACES === -->
  <!-- Top face -->
  <polygon points="200,55 350,130 200,205 50,130" fill="url(#topGrad)" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Left face -->
  <polygon points="50,130 200,205 200,350 50,275" fill="url(#leftGrad)" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Right face -->
  <polygon points="200,205 350,130 350,275 200,350" fill="url(#rightGrad)" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- === GRID LINES === -->
  <!-- Top face grid (4x4) -->
  <g stroke="#7098b8" stroke-width="1.3" opacity="0.6">
    <line x1="162" y1="74" x2="312" y2="149"/>
    <line x1="125" y1="93" x2="275" y2="168"/>
    <line x1="87" y1="111" x2="237" y2="186"/>
    <line x1="87" y1="111" x2="237" y2="74"/>
    <line x1="125" y1="130" x2="275" y2="93"/>
    <line x1="162" y1="149" x2="312" y2="111"/>
  </g>
  <!-- Left face grid -->
  <g stroke="#3a5878" stroke-width="1.3" opacity="0.5">
    <line x1="50" y1="166" x2="200" y2="241"/>
    <line x1="50" y1="203" x2="200" y2="278"/>
    <line x1="50" y1="239" x2="200" y2="314"/>
    <line x1="87" y1="149" x2="87" y2="294"/>
    <line x1="125" y1="168" x2="125" y2="313"/>
    <line x1="162" y1="186" x2="162" y2="331"/>
  </g>
  <!-- Right face grid -->
  <g stroke="#5a4030" stroke-width="1.3" opacity="0.45">
    <line x1="200" y1="241" x2="350" y2="166"/>
    <line x1="200" y1="278" x2="350" y2="203"/>
    <line x1="200" y1="314" x2="350" y2="239"/>
    <line x1="237" y1="186" x2="237" y2="331"/>
    <line x1="275" y1="168" x2="275" y2="313"/>
    <line x1="312" y1="149" x2="312" y2="294"/>
  </g>

  <!-- === NEURAL NETWORK PATTERNS === -->
  <!-- Top face neurons + connections -->
  <g clip-path="url(#topClip)" opacity="0.4">
    <line x1="155" y1="100" x2="225" y2="118" stroke="#5888a8" stroke-width="1.2"/>
    <line x1="225" y1="118" x2="185" y2="145" stroke="#5888a8" stroke-width="1.2"/>
    <line x1="155" y1="100" x2="260" y2="98" stroke="#5888a8" stroke-width="1.2"/>
    <line x1="135" y1="128" x2="185" y2="145" stroke="#5888a8" stroke-width="1.2"/>
    <line x1="260" y1="98" x2="290" y2="132" stroke="#5888a8" stroke-width="1.2"/>
    <line x1="200" y1="80" x2="155" y2="100" stroke="#5888a8" stroke-width="1.2"/>
    <line x1="200" y1="80" x2="260" y2="98" stroke="#5888a8" stroke-width="1.2"/>
    <line x1="225" y1="118" x2="290" y2="132" stroke="#5888a8" stroke-width="1.2"/>
    <line x1="135" y1="128" x2="155" y2="100" stroke="#5888a8" stroke-width="1.2"/>
    <circle cx="155" cy="100" r="8" fill="#f0f4f8" stroke="#5888a8" stroke-width="1.8"/>
    <circle cx="225" cy="118" r="7" fill="#f0f4f8" stroke="#5888a8" stroke-width="1.8"/>
    <circle cx="185" cy="145" r="8" fill="#f0f4f8" stroke="#5888a8" stroke-width="1.8"/>
    <circle cx="260" cy="98" r="6" fill="#f0f4f8" stroke="#5888a8" stroke-width="1.8"/>
    <circle cx="135" cy="128" r="6" fill="#f0f4f8" stroke="#5888a8" stroke-width="1.8"/>
    <circle cx="290" cy="132" r="7" fill="#f0f4f8" stroke="#5888a8" stroke-width="1.8"/>
    <circle cx="200" cy="80" r="6" fill="#f0f4f8" stroke="#5888a8" stroke-width="1.8"/>
  </g>

  <!-- Left face neurons -->
  <g clip-path="url(#leftClip)" opacity="0.35">
    <line x1="100" y1="178" x2="148" y2="222" stroke="#5070a0" stroke-width="1"/>
    <line x1="78" y1="242" x2="148" y2="222" stroke="#5070a0" stroke-width="1"/>
    <line x1="148" y1="222" x2="135" y2="272" stroke="#706030" stroke-width="1"/>
    <line x1="78" y1="242" x2="108" y2="302" stroke="#806030" stroke-width="1"/>
    <line x1="135" y1="272" x2="168" y2="295" stroke="#806030" stroke-width="1"/>
    <line x1="135" y1="272" x2="108" y2="302" stroke="#806030" stroke-width="1"/>
    <circle cx="100" cy="178" r="7" fill="#e8eef4" stroke="#5070a0" stroke-width="1.5"/>
    <circle cx="148" cy="222" r="8" fill="#e8eef4" stroke="#5070a0" stroke-width="1.5"/>
    <circle cx="78" cy="242" r="6" fill="#e8eef4" stroke="#5070a0" stroke-width="1.5"/>
    <circle cx="135" cy="272" r="7" fill="#f0e8d8" stroke="#806030" stroke-width="1.5"/>
    <circle cx="108" cy="302" r="6" fill="#f0e8d8" stroke="#806030" stroke-width="1.5"/>
    <circle cx="168" cy="295" r="5" fill="#f0e8d8" stroke="#806030" stroke-width="1.5"/>
  </g>

  <!-- Right face neurons -->
  <g clip-path="url(#rightClip)" opacity="0.3">
    <line x1="285" y1="178" x2="245" y2="222" stroke="#405868" stroke-width="1"/>
    <line x1="285" y1="178" x2="308" y2="228" stroke="#405868" stroke-width="1"/>
    <line x1="245" y1="222" x2="265" y2="272" stroke="#604828" stroke-width="1"/>
    <line x1="308" y1="228" x2="295" y2="292" stroke="#604828" stroke-width="1"/>
    <line x1="265" y1="272" x2="235" y2="302" stroke="#604828" stroke-width="1"/>
    <line x1="265" y1="272" x2="295" y2="292" stroke="#604828" stroke-width="1"/>
    <circle cx="285" cy="178" r="7" fill="#e0e8f0" stroke="#405868" stroke-width="1.5"/>
    <circle cx="245" cy="222" r="6" fill="#e0e8f0" stroke="#405868" stroke-width="1.5"/>
    <circle cx="308" cy="228" r="6" fill="#e0e8f0" stroke="#405868" stroke-width="1.5"/>
    <circle cx="265" cy="272" r="7" fill="#e8dcc8" stroke="#604828" stroke-width="1.5"/>
    <circle cx="295" cy="292" r="5" fill="#e8dcc8" stroke="#604828" stroke-width="1.5"/>
    <circle cx="235" cy="302" r="6" fill="#e8dcc8" stroke="#604828" stroke-width="1.5"/>
  </g>
</svg>
