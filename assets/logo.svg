<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Brain-circuit icon -->
  <g transform="translate(10, 10)">
    <!-- Outer hexagonal shape -->
    <path d="M50 5 L87 25 L87 65 L50 85 L13 65 L13 25 Z" fill="url(#grad1)" opacity="0.9"/>
    <!-- Inner neural network nodes -->
    <circle cx="50" cy="30" r="6" fill="white" opacity="0.95"/>
    <circle cx="32" cy="55" r="5" fill="white" opacity="0.85"/>
    <circle cx="68" cy="55" r="5" fill="white" opacity="0.85"/>
    <circle cx="50" cy="68" r="4" fill="white" opacity="0.75"/>
    <!-- Connection lines -->
    <line x1="50" y1="36" x2="35" y2="51" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="50" y1="36" x2="65" y2="51" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="35" y1="59" x2="47" y2="66" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="65" y1="59" x2="53" y2="66" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <!-- Data flow dots -->
    <circle cx="42" cy="43" r="2" fill="white" opacity="0.7"/>
    <circle cx="58" cy="43" r="2" fill="white" opacity="0.7"/>
    <!-- Brick pattern overlay -->
    <rect x="22" y="20" width="12" height="7" rx="1" fill="white" opacity="0.15"/>
    <rect x="36" y="20" width="12" height="7" rx="1" fill="white" opacity="0.15"/>
    <rect x="66" y="20" width="12" height="7" rx="1" fill="white" opacity="0.15"/>
    <rect x="29" y="62" width="12" height="7" rx="1" fill="white" opacity="0.12"/>
    <rect x="55" y="62" width="12" height="7" rx="1" fill="white" opacity="0.12"/>
  </g>
  <!-- Text: NeuroBrix — attached, no space -->
  <!-- NeuroBrix as single text with tspan for dual coloring — no gap -->
  <text x="115" y="52" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700">
    <tspan fill="#7dd3fc">Neuro</tspan><tspan fill="url(#grad1)">Brix</tspan>
  </text>
  <!-- Tagline -->
  <text x="115" y="78" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#6b7280" letter-spacing="0.5">Universal Deep Learning Inference Engine</text>
  <!-- Version badge -->
  <rect x="115" y="88" width="52" height="18" rx="9" fill="#6366f1" opacity="0.12"/>
  <text x="122" y="101" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#6366f1">v0.1.0a</text>
</svg>
