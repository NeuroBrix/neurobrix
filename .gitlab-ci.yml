stages:
  - build
  - publish
  - pages

# ============================================
# PyPI Publish — triggers on version tags (v*)
# ============================================
# Setup (one-time):
#   1. Create API token on pypi.org/manage/account/token/
#   2. In GitLab: Settings > CI/CD > Variables > Add:
#      Key: PYPI_TOKEN  |  Value: pypi-xxxxx  |  Masked: yes  |  Protected: yes

build-package:
  stage: build
  image: python:3.10-slim
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - pip install build
    - python -m build
  artifacts:
    paths:
      - dist/

publish-pypi:
  stage: publish
  image: python:3.10-slim
  needs: [build-package]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - pip install twine
    - TWINE_USERNAME=__token__ TWINE_PASSWORD=$PYPI_TOKEN twine upload dist/*

# ============================================
# GitLab Pages — docs deploy on main push
# ============================================

pages:
  stage: pages
  image: python:3.12-slim
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - docs/**/*
        - mkdocs.yml
        - src/neurobrix/**/*
    - if: $CI_PIPELINE_SOURCE == "web"
  script:
    - pip install mkdocs mkdocs-material "mkdocstrings[python]"
        mkdocs-gen-files mkdocs-literate-nav mkdocs-section-index
    - mkdocs build --site-dir public
  artifacts:
    paths:
      - public
