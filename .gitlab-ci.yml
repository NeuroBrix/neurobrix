stages:
  - build
  - publish
  - pages

# ============================================
# PyPI Publish — triggers on version tags (v*)
# ============================================
# Uses OIDC trusted publishing (no API token needed).
# One-time setup on PyPI: Settings > Publishing > Add GitLab publisher:
#   Namespace: neurobrix | Project: neurobrix | Workflow: .gitlab-ci.yml
#
# Fallback: if OIDC not configured, set PYPI_TOKEN CI/CD variable.

build-package:
  stage: build
  image: python:3.10-slim
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - pip install build
    - python -m build
  artifacts:
    paths:
      - dist/

publish-pypi:
  stage: publish
  image: python:3.10-slim
  needs: [build-package]
  # MANUAL ONLY. Never auto-publish on tag push — a tag can be created
  # for a commit that still contains a secret and PyPI uploads are
  # immutable (can't overwrite, yank leaves file downloadable). Operator
  # reviews the build artefacts on GitLab and clicks the job manually
  # once it's clean.
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
      when: manual
      allow_failure: true
  id_tokens:
    PYPI_ID_TOKEN:
      aud: pypi
  script:
    - pip install twine requests
    - |
      # Try OIDC trusted publishing first, fall back to PYPI_TOKEN
      python3 -c "
      import requests, os, sys, json
      try:
          resp = requests.post(
              'https://pypi.org/_/oidc/mint-token',
              json={'token': os.environ.get('PYPI_ID_TOKEN', '')}
          )
          resp.raise_for_status()
          token = resp.json()['token']
          print('OIDC: obtained short-lived upload token', file=sys.stderr)
      except Exception as e:
          print(f'OIDC failed ({e}), trying PYPI_TOKEN fallback', file=sys.stderr)
          token = os.environ.get('PYPI_TOKEN', '')
          if not token:
              print('ERROR: No PYPI_TOKEN fallback set', file=sys.stderr)
              sys.exit(1)
          print('Fallback: using PYPI_TOKEN', file=sys.stderr)
      with open('.pypi_token', 'w') as f:
          f.write(token)
      "
      TWINE_USERNAME=__token__ TWINE_PASSWORD=$(cat .pypi_token) twine upload dist/*
      rm -f .pypi_token

# ============================================
# GitLab Pages — docs deploy on main push
# ============================================

pages:
  stage: pages
  image: python:3.12-slim
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - docs/**/*
        - mkdocs.yml
        - src/neurobrix/**/*
    - if: $CI_PIPELINE_SOURCE == "web"
  script:
    - pip install mkdocs mkdocs-material "mkdocstrings[python]"
        mkdocs-gen-files mkdocs-literate-nav mkdocs-section-index
    - mkdocs build --site-dir public
  artifacts:
    paths:
      - public
