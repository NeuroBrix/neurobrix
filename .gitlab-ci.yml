stages:
  - build
  - publish
  - pages

# ============================================
# PyPI Publish — triggers on version tags (v*)
# ============================================
# Uses OIDC trusted publishing (no API token needed).
# One-time setup on PyPI: Settings > Publishing > Add GitLab publisher:
#   Namespace: neurobrix | Project: neurobrix | Workflow: .gitlab-ci.yml
#
# Fallback: if OIDC not configured, set PYPI_TOKEN CI/CD variable.

build-package:
  stage: build
  image: python:3.10-slim
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - pip install build
    - python -m build
  artifacts:
    paths:
      - dist/

publish-pypi:
  stage: publish
  image: python:3.10-slim
  needs: [build-package]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  id_tokens:
    PYPI_ID_TOKEN:
      aud: pypi
  script:
    - pip install twine requests
    - |
      # Exchange GitLab OIDC token for short-lived PyPI upload token
      PYPI_UPLOAD_TOKEN=$(python3 -c "
      import requests, os, json
      resp = requests.post(
          'https://pypi.org/_/oidc/mint-token',
          json={'token': os.environ['PYPI_ID_TOKEN']}
      )
      resp.raise_for_status()
      print(resp.json()['token'])
      ")
      TWINE_USERNAME=__token__ TWINE_PASSWORD="$PYPI_UPLOAD_TOKEN" twine upload dist/*

# ============================================
# GitLab Pages — docs deploy on main push
# ============================================

pages:
  stage: pages
  image: python:3.12-slim
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - docs/**/*
        - mkdocs.yml
        - src/neurobrix/**/*
    - if: $CI_PIPELINE_SOURCE == "web"
  script:
    - pip install mkdocs mkdocs-material "mkdocstrings[python]"
        mkdocs-gen-files mkdocs-literate-nav mkdocs-section-index
    - mkdocs build --site-dir public
  artifacts:
    paths:
      - public
